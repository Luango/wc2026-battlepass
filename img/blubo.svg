<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bluboGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="bluboBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Glow background -->
  <circle cx="100" cy="100" r="95" fill="url(#bluboGlow)" />

  <!-- Main body (rounded square) -->
  <rect x="40" y="50" width="120" height="120" rx="20" fill="url(#bluboBody)" opacity="0.9" />

  <!-- Light spots for holographic effect -->
  <circle cx="60" cy="70" r="8" fill="#00ffff" opacity="0.6" />
  <circle cx="140" cy="75" r="6" fill="#00ffff" opacity="0.5" />
  <circle cx="75" cy="130" r="7" fill="#00ffff" opacity="0.5" />
  <circle cx="130" cy="140" r="6" fill="#00ffff" opacity="0.4" />

  <!-- Eyes (stars) -->
  <g transform="translate(70, 95)">
    <polygon points="0,-8 2,-2 8,-1 3,3 4,9 0,5 -4,9 -3,3 -8,-1 -2,-2" fill="#ffffff" />
  </g>
  <g transform="translate(130, 95)">
    <polygon points="0,-8 2,-2 8,-1 3,3 4,9 0,5 -4,9 -3,3 -8,-1 -2,-2" fill="#ffffff" />
  </g>

  <!-- Smile -->
  <path d="M 80 125 Q 100 135 120 125" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" />

  <!-- Feet/legs -->
  <rect x="55" y="155" width="15" height="25" rx="7" fill="url(#bluboBody)" opacity="0.85" />
  <rect x="130" y="155" width="15" height="25" rx="7" fill="url(#bluboBody)" opacity="0.85" />

  <!-- Outline glow -->
  <rect x="40" y="50" width="120" height="120" rx="20" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.5" />
</svg>